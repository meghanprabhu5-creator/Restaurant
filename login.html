<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Spice Garden Restaurant</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-body">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card p-4 shadow rounded-4">

      <!-- Logo / Title -->
      <div class="text-center mb-4">
        <h2 class="text-danger fw-bold">🍽️ Spice Garden</h2>
        <p class="text-muted">Welcome back! Please login to continue.</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Username -->
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Enter your username" required/>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="password" placeholder="" required/>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="text-danger small mb-2" style="display:none;">
          ❌ Invalid username or password!
        </div>

        <!-- Login Button -->
        <div class="d-grid">
          <button type="submit" class="btn btn-danger btn-lg rounded-pill">Login</button>
        </div>

        <!-- Hint -->
        <div class="text-center mt-3 text-muted small">
          <p>Demo credentials: <strong>admin</strong> / <strong>1234</strong></p>
        </div>

      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
