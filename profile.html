<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - Spice Garden Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🍽️ Spice Garden</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== PAGE BANNER ===== -->
  <div class="page-banner">
    <h2 class="fw-bold">My Profile</h2>
    <p>Manage your account details</p>
  </div>

  <!-- ===== PROFILE SECTION ===== -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">

          <!-- Profile Card -->
          <div class="card profile-card p-4 text-center">

            <!-- Avatar -->
            <div class="profile-avatar mx-auto">
              <i class="bi bi-person-fill"></i>
            </div>

            <h4 class="fw-bold" id="profileName">Admin User</h4>
            <p class="text-muted" id="profileEmail">admin@spicegarden.com</p>
            <span class="badge bg-danger mb-3">Member Since 2024</span>

            <hr/>

            <!-- Profile Details -->
            <div class="text-start">

              <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" class="form-control" value="Admin User" id="fullName"/>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" value="admin@spicegarden.com" id="emailField"/>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" class="form-control" value="+91 98765 43210"/>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Favourite Dish</label>
                <input type="text" class="form-control" value="Chicken Biryani"/>
              </div>

            </div>

            <!-- Success Alert -->
            <div id="profileSuccess" class="alert alert-success d-none">
              ✅ Profile updated successfully!
            </div>

            <!-- Save Button -->
            <div class="d-grid">
              <button class="btn btn-danger rounded-pill" onclick="saveProfile()">
                <i class="bi bi-save me-2"></i>Save Changes
              </button>
            </div>

            <!-- Logout Button -->
            <div class="d-grid mt-2">
              <a href="login.html" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="py-4 mt-4">
    <div class="container text-center">
      <p class="mb-1">🍽️ <strong class="text-white">Spice Garden Restaurant</strong></p>
      <p class="small">© 2024 All Rights Reserved | Made with ❤️</p>
      <div class="mt-2">
        <a href="about.html" class="me-3">About</a>
        <a href="contact.html" class="me-3">Contact</a>
        <a href="profile.html">Profile</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
